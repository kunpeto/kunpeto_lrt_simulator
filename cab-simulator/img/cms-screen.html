<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>CMS 螢幕組裝預覽</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

.cms-screen {
  position: relative;
  width: 1024px;
  height: 768px;
  background: #0c1828;
  overflow: hidden;
  border: 2px solid #333;
}

/* 切片：從來源圖裁切一塊，放到指定位置 */
.slice {
  position: absolute;
  background-repeat: no-repeat;
  image-rendering: auto;
}
.slice-cms { background-image: url('cms-sprites/cms-test.png'); }
.slice-door { background-image: url('cms-sprites/cms-door.png'); }

/* 動態文字覆蓋層 */
.text-overlay {
  position: absolute;
  color: #c8c8a0;
  font-family: monospace;
  pointer-events: none;
}

/* 訊息欄背景（覆蓋原始文字） */
.infobar-bg {
  position: absolute;
  background: #0c1828;
}

/* 狀態切換用 */
.hidden { display: none; }
</style>
</head>
<body>

<div class="cms-screen" id="cmsScreen">

  <!-- ============================================ -->
  <!--  基底：用原圖鋪滿整個螢幕當背景框架           -->
  <!-- ============================================ -->
  <div class="slice slice-cms" style="
    left: 0; top: 0; width: 1024px; height: 768px;
    background-position: 0 0;
    background-size: 1024px 768px;
    opacity: 1;

    left:266px; top:466px; width:200px; height:110px;

  <!-- ============================================ -->
  <!--  右區：列車示意圖                              -->
  <!-- ============================================ -->

  <!-- 完全遮蓋右區（蓋掉原始離線車門+Err） -->
  <div class="infobar-bg" style="left:655px; top:68px; width:370px; height:624px; z-index:5;"></div>

  <!-- 列車車體（從來源圖切，放在遮蓋層上方） -->
